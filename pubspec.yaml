name: practica_bd
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^3.2.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.0
  salomon_bottom_bar: ^3.3.2
  table_calendar: ^3.1.2
  badges: ^3.1.2
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Exo2
      fonts:
        - asset: fonts/Exo2-Regular.ttf
        - asset: fonts/Exo2-Medium.ttf
          weight: 500
        - asset: fonts/Exo2-SemiBold.ttf
          weight: 600
        - asset: fonts/Exo2-Bold.ttf
          weight: 700

    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf
        
    - family: Jedi
      fonts:
        - asset: fonts/Starjedi.ttf
